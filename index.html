<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tree Growth Visualization Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <p class="build-banner" id="buildBanner">Loading latest build...</p>
      <div class="canvas-frame">
        <svg
          id="treeSvg"
          viewBox="0 0 1000 720"
          aria-label="Interactive learning tree growth canvas"
          role="img"
        >
          <g id="treeMotion">
            <g id="branchBackdrop"></g>
            <g id="branchGroup"></g>
            <g id="tipGroup"></g>
            <g id="nodeGroup"></g>
          </g>
        </svg>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
