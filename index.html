<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tree Growth Visualization Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="app-brand" aria-label="Flourish">
        <img class="app-brand-logo" src="./logo-flourish.svg" alt="" aria-hidden="true" />
        <span class="app-brand-name">flourish</span>
      </div>
      <p class="build-banner" id="buildBanner">Loading latest build...</p>
      <section class="canvas-frame" id="canvasFrame">
        <svg
          id="treeSvg"
          viewBox="0 0 1000 720"
          aria-label="Interactive learning tree growth canvas"
          role="img"
        >
          <g id="treeViewport">
            <g id="treeZoomGroup">
              <g id="treeMotion">
                <g id="branchBackdrop"></g>
                <g id="branchGroup"></g>
                <g id="tipGroup"></g>
                <g id="nodeGroup"></g>
              </g>
              <path
                d="M -10000 688
                  Q -9500 676 -9000 688
                  T -8000 688
                  T -7000 688
                  T -6000 688
                  T -5000 688
                  T -4000 688
                  T -3000 688
                  T -2000 688
                  T -1000 688
                  T 0 688
                  T 1000 688
                  T 2000 688
                  T 3000 688
                  T 4000 688
                  T 5000 688
                  T 6000 688
                  T 7000 688
                  T 8000 688
                  T 9000 688
                  T 10000 688
                  L 10000 20000
                  L -10000 20000
                  Z"
                fill="var(--green)"
                aria-hidden="true"
              ></path>
              <g id="treeBaseLabelGroup" aria-hidden="true"></g>
            </g>
          </g>
        </svg>
        <div class="petal-particles" id="petalParticles" aria-hidden="true"></div>

        <div class="canvas-zoom" role="group" aria-label="Tree zoom controls">
          <button class="canvas-zoom-button" id="zoomOutButton" type="button" aria-label="Zoom out">
            -
          </button>
          <button class="canvas-zoom-readout" id="zoomResetButton" type="button" aria-label="Reset zoom to 100%">
            100%
          </button>
          <button class="canvas-zoom-button" id="zoomInButton" type="button" aria-label="Zoom in">
            +
          </button>
        </div>

        <div class="canvas-hint" id="canvasHint">Drag to move. Scroll or use + / - to zoom.</div>

        <aside class="node-info-panel" id="nodeInfoPanel" aria-live="polite" hidden>
          <h2 class="node-info-title" id="nodeInfoTitle">Hover a node</h2>
          <p class="node-info-summary" id="nodeInfoSummary">
            Move over any branch to explore the concept.
          </p>
        </aside>

        <div class="node-detail-layer" id="nodeDetailLayer" hidden>
          <section
            class="node-detail-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="nodeDetailTitle"
          >
            <div class="node-detail-header">
              <div>
                <p class="node-detail-eyebrow">Full description</p>
                <h2 class="node-detail-title" id="nodeDetailTitle">Untitled topic</h2>
                <p class="node-detail-path" id="nodeDetailPath"></p>
              </div>
              <button class="node-detail-close" id="nodeDetailClose" type="button" aria-label="Close full description">
                Close
              </button>
            </div>
            <div class="node-detail-body" id="nodeDetailBody"></div>
            <div class="node-detail-actions">
              <button class="node-detail-cta" id="nodeDetailCta" type="button" hidden>
                Test your understanding
              </button>
              <button class="node-detail-explain" id="nodeDetailExplain" type="button" hidden>
                Explain more
              </button>
            </div>
          </section>
        </div>

        <div class="topic-modal" id="topicModal" hidden>
          <section class="topic-modal-card">
            <h2 class="topic-modal-title" id="topicModalTitle">What do you want to learn</h2>

            <form class="topic-modal-form" id="topicForm">
              <label class="topic-modal-label" for="topicInput">Topic</label>
              <input
                class="topic-modal-input"
                id="topicInput"
                name="topic"
                type="text"
                placeholder="Linear algebra"
                autocomplete="off"
                enterkeyhint="go"
              />
              <button class="topic-modal-submit" id="topicSubmit" type="submit">
                Start
              </button>
            </form>

            <p class="topic-modal-status" id="topicStatus" hidden></p>
          </section>
        </div>
      </section>

      <section class="question-panel" id="questionPanel" hidden aria-labelledby="questionTitle">
        <div class="question-panel-card">
          <div class="question-panel-header">
            <h2 class="question-panel-title" id="questionTitle"></h2>
            <button class="question-panel-close" id="questionClose" type="button" aria-label="Close">✕</button>
          </div>

          <p class="question-panel-prompt" id="questionPrompt"></p>

          <form class="question-panel-form" id="questionForm">
            <textarea
              class="question-panel-input"
              id="questionAnswer"
              name="answer"
              rows="4"
              placeholder="Share your thinking..."
            ></textarea>

            <div class="question-panel-actions">
              <button class="question-panel-submit" id="questionSubmit" type="submit">
                That's my thinking
              </button>
              <button class="question-panel-reset" id="questionReset" type="button">
                Clear
              </button>
            </div>
          </form>

          <p class="question-panel-status" id="questionStatus" hidden></p>
        </div>
      </section>

    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
